services:
  postgres:
    image: postgres:16-alpine
    container_name: wandy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wandy
      POSTGRES_PASSWORD: wandy
      POSTGRES_DB: wandy
    ports:
      - "5433:5432"
    volumes:
      - wandy_pg_data:/var/lib/postgresql/data

volumes:
  wandy_pg_data:
