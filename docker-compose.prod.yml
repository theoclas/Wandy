services:
  postgres:
    image: postgres:16-alpine
    container_name: wandy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wandy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-wandy}
    volumes:
      - wandy_pg_data:/var/lib/postgresql/data
    networks:
      - wandy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wandy} -d ${POSTGRES_DB:-wandy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wandy-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wandy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wandy}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 3000
      RUN_SEED: ${RUN_SEED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wandy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wandy-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - wandy

volumes:
  wandy_pg_data:

networks:
  wandy:
    driver: bridge
